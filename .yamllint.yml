extends: default
rules:
  # GitHub Actions uses "on:" as the trigger key; YAML 1.1 parses bare "on"
  # as boolean true. Quoting it breaks GitHub Actions, so we allow it here.
  truthy:
    allowed-values: ["true", "false"]
    check-keys: false
  # "---" document start is optional and not used in GitHub Actions convention.
  document-start: disable
  # Actions expressions (${{ }}) and docker commands can exceed 80 chars.
  line-length:
    max: 120
