name: Reusable Node CI

on:
  workflow_call:

jobs:
  node:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: node-js/package-lock.json

      - run: |
          cd node-js
          npm ci

      - name: Lint
        continue-on-error: true
        run: |
          cd node-js
          npx eslint .

      - name: Build
        run: |
          cd node-js
          npm run build

      - name: Test
        run: |
          cd node-js
          npx vitest run
