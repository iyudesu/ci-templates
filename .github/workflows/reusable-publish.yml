name: Reusable Publish

on:
  workflow_call:
    inputs:
      service:
        required: true
        type: string
      version:
        required: false
        type: string
        default: ''

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            RAW="${{ inputs.version }}"
          else
            RAW="${GITHUB_REF#refs/tags/}"
          fi
          # Strip the leading "<service>-v" tag prefix -> bare semver
          # e.g. node-v1.2.3 -> 1.2.3
          VERSION="${RAW#*-v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Login GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build & Push
        run: |
          IMAGE=ghcr.io/${{ github.repository }}/${{ inputs.service }}
          docker build -t "$IMAGE:${{ steps.version.outputs.version }}" "./${{ inputs.service }}"
          docker push "$IMAGE:${{ steps.version.outputs.version }}"
