name: Reusable Go CI

on:
  workflow_call:

jobs:
  go:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Lint (golangci-lint)
        uses: golangci/golangci-lint-action@v6
        continue-on-error: true
        with:
          working-directory: go

      - name: Build
        run: |
          cd go
          go build ./...

      - name: Test
        run: |
          cd go
          go test ./...
