name: Python CI

on:
  push:
    branches: ['**']
    paths:
      - 'python/**'
      - '.github/workflows/python-ci.yml'
      - '.github/workflows/reusable-python.yml'
  pull_request:
    branches: ['**', '!main']
    paths:
      - 'python/**'
      - '.github/workflows/python-ci.yml'
      - '.github/workflows/reusable-python.yml'

jobs:
  ci:
    uses: ./.github/workflows/reusable-python.yml

  release:
    name: Release
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      new_tag: ${{ steps.release.outputs.new_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install release tooling
        run: npm ci

      - name: Run semantic-release
        id: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BEFORE=$(git tag -l "python-v*" --sort=-version:refname | head -1)
          npx semantic-release --extends ./.releaserc.python.json
          git fetch --tags
          AFTER=$(git tag -l "python-v*" --sort=-version:refname | head -1)
          if [ "$BEFORE" != "$AFTER" ] && [ -n "$AFTER" ]; then
            echo "new_tag=$AFTER" >> "$GITHUB_OUTPUT"
          fi

  publish:
    name: Publish Docker Image
    needs: release
    if: needs.release.outputs.new_tag != ''
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/reusable-docker.yml
    secrets: inherit
    with:
      service: python
      version: ${{ needs.release.outputs.new_tag }}
