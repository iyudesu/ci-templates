name: Python CI

on:
  push:
    branches:
      - main
      - develop
      - 'feature/**'
      - 'release/**'
      - 'hotfix/**'
    paths:
      - 'python/**'
      - '.github/workflows/python-ci.yml'
      - '.github/workflows/reusable-python-*.yml'
      - '.github/workflows/reusable-release.yml'
      - '.github/workflows/reusable-publish.yml'
  pull_request:
    branches:
      - main
      - develop
      - 'release/**'
    paths:
      - 'python/**'
      - '.github/workflows/python-ci.yml'
      - '.github/workflows/reusable-python-*.yml'
      - '.github/workflows/reusable-release.yml'
      - '.github/workflows/reusable-publish.yml'

jobs:
  lint:
    uses: ./.github/workflows/reusable-python-lint.yml

  build:
    needs: lint
    uses: ./.github/workflows/reusable-python-build.yml

  test:
    needs: build
    uses: ./.github/workflows/reusable-python-test.yml

  release:
    name: Release
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
      issues: write
      pull-requests: write
    uses: ./.github/workflows/reusable-release.yml
    with:
      service: python
      releaserc: .releaserc.python.json
      tag_pattern: python-v*

  publish:
    name: Publish Docker Image
    needs: release
    if: needs.release.outputs.new_tag != ''
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/reusable-publish.yml
    secrets: inherit
    with:
      service: python
      version: ${{ needs.release.outputs.new_tag }}
