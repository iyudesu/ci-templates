name: Reusable Python Lint

on:
  workflow_call:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: 3.12

      - name: Lint
        continue-on-error: true
        run: |
          pip install flake8
          cd python
          flake8
