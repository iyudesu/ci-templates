name: Reusable Rust Build

on:
  workflow_call:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: cargo-${{ hashFiles('rust/Cargo.lock') }}

      - uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: |
          cd rust
          cargo build --release
