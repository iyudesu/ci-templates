name: Node CI

on:
  push:
    branches:
      - develop
      - 'feature/**'
      - 'release/**'
      - 'hotfix/**'
    paths:
      - 'node-js/**'
      - '.github/workflows/node-ci.yml'
      - '.github/workflows/reusable-node-*.yml'
      - '.github/workflows/reusable-release.yml'
      - '.github/workflows/reusable-publish.yml'
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main
      - develop
      - 'release/**'
    paths:
      - 'node-js/**'
      - '.github/workflows/node-ci.yml'
      - '.github/workflows/reusable-node-*.yml'
      - '.github/workflows/reusable-release.yml'
      - '.github/workflows/reusable-publish.yml'

jobs:
  lint:
    uses: ./.github/workflows/reusable-node-lint.yml

  build:
    needs: lint
    uses: ./.github/workflows/reusable-node-build.yml

  test:
    needs: build
    uses: ./.github/workflows/reusable-node-test.yml

  release:
    name: Release
    needs: test
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.merged == true &&
      github.event.pull_request.base.ref == 'main'
    permissions:
      contents: write
      issues: write
      pull-requests: write
    uses: ./.github/workflows/reusable-release.yml
    with:
      service: node
      releaserc: .releaserc.node-js.json
      tag_pattern: node-v*

  publish:
    name: Publish Docker Image
    needs: release
    if: needs.release.outputs.new_tag != ''
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/reusable-publish.yml
    secrets: inherit
    with:
      service: node-js
      version: ${{ needs.release.outputs.new_tag }}
