name: Node CI

on:
  push:
    branches: ['**']
    paths:
      - 'node-js/**'
      - '.github/workflows/node-ci.yml'
      - '.github/workflows/reusable-node.yml'
  pull_request:
    branches: ['**', '!main']
    paths:
      - 'node-js/**'
      - '.github/workflows/node-ci.yml'
      - '.github/workflows/reusable-node.yml'

jobs:
  call:
    uses: ./.github/workflows/reusable-node.yml
