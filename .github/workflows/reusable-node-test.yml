name: Reusable Node Test

on:
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: node-js/package-lock.json

      - run: cd node-js && npm ci

      - name: Test
        run: cd node-js && npx vitest run
