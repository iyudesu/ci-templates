name: Rust CI

on:
  push:
    branches: ['**']
    paths:
      - 'rust/**'
      - '.github/workflows/rust-ci.yml'
      - '.github/workflows/reusable-rust-*.yml'
      - '.github/workflows/reusable-release.yml'
      - '.github/workflows/reusable-publish.yml'
  pull_request:
    branches: ['**', '!main']
    paths:
      - 'rust/**'
      - '.github/workflows/rust-ci.yml'
      - '.github/workflows/reusable-rust-*.yml'
      - '.github/workflows/reusable-release.yml'
      - '.github/workflows/reusable-publish.yml'

jobs:
  lint:
    uses: ./.github/workflows/reusable-rust-lint.yml

  build:
    needs: lint
    uses: ./.github/workflows/reusable-rust-build.yml

  test:
    needs: build
    uses: ./.github/workflows/reusable-rust-test.yml

  release:
    name: Release
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
      issues: write
      pull-requests: write
    uses: ./.github/workflows/reusable-release.yml
    with:
      service: rust
      releaserc: .releaserc.rust.json
      tag_pattern: rust-v*

  publish:
    name: Publish Docker Image
    needs: release
    if: needs.release.outputs.new_tag != ''
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/reusable-publish.yml
    secrets: inherit
    with:
      service: rust
      version: ${{ needs.release.outputs.new_tag }}
