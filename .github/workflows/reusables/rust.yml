name: Reusable Rust CI

on:
  workflow_call:

jobs:
  rust:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: cargo-${{ hashFiles('rust/Cargo.lock') }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Lint
        run: |
          cd rust
          cargo clippy -- -D warnings

      - name: Build
        run: |
          cd rust
          cargo build --release

      - name: Test
        run: |
          cd rust
          cargo test