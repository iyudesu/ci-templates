name: Reusable Go Lint

on:
  workflow_call:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Lint
        uses: golangci/golangci-lint-action@v6
        continue-on-error: true
        with:
          working-directory: go
